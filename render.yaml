services:
  - type: web
    name: vortex-tracker
    env: node
    buildCommand: npm install && cd linkedin_extractor && pip install -r requirements.txt && playwright install chromium
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
